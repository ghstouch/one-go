<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen">
<div class="flex min-h-screen">
    <aside class="w-64 bg-gray-900 min-h-screen flex flex-col">
        <div class="p-4 border-b border-gray-800"><div class="flex items-center space-x-3"><div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center"><i class="fas fa-route text-white text-xl"></i></div><div><h1 class="text-white font-bold text-xl">OmniRoute</h1><p class="text-gray-400 text-xs">AI Gateway</p></div></div></div>
        <nav class="flex-1 py-4 overflow-y-auto"><ul class="space-y-1 px-3">
            <li><a href="/dashboard" class="flex items-center space-x-3 px-3 py-2 rounded-lg {{ if eq .active "dashboard" }}bg-blue-600 text-white{{ else }}text-gray-300 hover:bg-gray-800{{ end }}"><i class="fas fa-chart-line w-5"></i><span>Dashboard</span></a></li>
            <li><a href="/providers" class="flex items-center space-x-3 px-3 py-2 rounded-lg {{ if eq .active "providers" }}bg-blue-600 text-white{{ else }}text-gray-300 hover:bg-gray-800{{ end }}"><i class="fas fa-plug w-5"></i><span>Providers</span></a></li>
            <li><a href="/combos" class="flex items-center space-x-3 px-3 py-2 rounded-lg {{ if eq .active "combos" }}bg-blue-600 text-white{{ else }}text-gray-300 hover:bg-gray-800{{ end }}"><i class="fas fa-layer-group w-5"></i><span>Combos</span></a></li>
            <li class="py-2"><div class="border-t border-gray-800"></div></li>
            <li><a href="/usage" class="flex items-center space-x-3 px-3 py-2 rounded-lg {{ if eq .active "usage" }}bg-blue-600 text-white{{ else }}text-gray-300 hover:bg-gray-800{{ end }}"><i class="fas fa-chart-bar w-5"></i><span>Usage</span></a></li>
            <li><a href="/logs" class="flex items-center space-x-3 px-3 py-2 rounded-lg {{ if eq .active "logs" }}bg-blue-600 text-white{{ else }}text-gray-300 hover:bg-gray-800{{ end }}"><i class="fas fa-list w-5"></i><span>Logs</span></a></li>
            <li class="py-2"><div class="border-t border-gray-800"></div></li>
            <li><a href="/api-keys" class="flex items-center space-x-3 px-3 py-2 rounded-lg {{ if eq .active "api-keys" }}bg-blue-600 text-white{{ else }}text-gray-300 hover:bg-gray-800{{ end }}"><i class="fas fa-key w-5"></i><span>API Keys</span></a></li>
            <li><a href="/proxy" class="flex items-center space-x-3 px-3 py-2 rounded-lg {{ if eq .active "proxy" }}bg-blue-600 text-white{{ else }}text-gray-300 hover:bg-gray-800{{ end }}"><i class="fas fa-network-wired w-5"></i><span>Proxy</span></a></li>
            <li><a href="/settings-page" class="flex items-center space-x-3 px-3 py-2 rounded-lg {{ if eq .active "settings" }}bg-blue-600 text-white{{ else }}text-gray-300 hover:bg-gray-800{{ end }}"><i class="fas fa-cog w-5"></i><span>Settings</span></a></li>
        </ul></nav>
        <div class="p-4 border-t border-gray-800"><div class="flex items-center space-x-3"><div class="w-8 h-8 bg-gray-700 rounded-full flex items-center justify-center"><i class="fas fa-user text-gray-300"></i></div><div class="flex-1"><p class="text-white text-sm font-medium">{{ .username }}</p></div><button onclick="logout()" class="text-gray-400 hover:text-white"><i class="fas fa-sign-out-alt"></i></button></div></div>
    </aside>
    <main class="flex-1 p-8" x-data="comboApp()">
        <div class="flex justify-between items-center mb-8">
            <div><h1 class="text-3xl font-bold text-gray-900">Combos</h1><p class="text-gray-600 mt-1">Manage routing combos</p></div>
            <button @click="openModal()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"><i class="fas fa-plus mr-2"></i>Add Combo</button>
        </div>
        <div x-show="alert.show" x-transition class="mb-4 px-4 py-3 rounded-lg" :class="alert.type==='success'?'bg-green-50 text-green-800 border border-green-200':'bg-red-50 text-red-800 border border-red-200'"><span x-text="alert.message"></span></div>
        <div x-show="loading" class="text-center py-12"><i class="fas fa-spinner fa-spin text-blue-500 text-3xl"></i></div>
        <div x-show="!loading && combos.length===0" class="bg-white rounded-xl shadow-sm p-12 text-center border">
            <i class="fas fa-layer-group text-gray-300 text-5xl mb-4"></i>
            <h3 class="text-lg font-medium text-gray-900">No combos configured</h3>
            <p class="text-gray-500 mt-2">Create a combo to route requests across providers</p>
        </div>
        <div x-show="!loading && combos.length>0" class="space-y-4">
            <template x-for="c in combos" :key="c.id">
                <div class="bg-white rounded-xl shadow-sm border p-5 hover:shadow-md transition-shadow">
                    <div class="flex items-center justify-between">
                        <div>
                            <h3 class="text-lg font-semibold text-gray-900" x-text="c.name"></h3>
                            <div class="flex items-center space-x-3 mt-1">
                                <span class="text-xs px-2 py-0.5 rounded-full font-medium bg-purple-100 text-purple-700" x-text="c.strategy"></span>
                                <span class="text-xs text-gray-500" x-text="(c.targets?c.targets.length:0)+' targets'"></span>
                            </div>
                        </div>
                        <div class="flex items-center space-x-3">
                            <button @click="openModal(c)" class="px-3 py-1.5 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100 text-sm"><i class="fas fa-edit mr-1"></i>Edit</button>
                            <button @click="confirmDelete(c)" class="px-3 py-1.5 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 text-sm"><i class="fas fa-trash mr-1"></i>Delete</button>
                        </div>
                    </div>
                    <div x-show="c.description" class="mt-2 text-sm text-gray-500" x-text="c.description"></div>
                </div>
            </template>
        </div>
        <div x-show="modal.open" x-transition.opacity class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center" @click.self="closeModal()">
            <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto" x-transition>
                <div class="p-6 border-b"><h2 class="text-xl font-bold" x-text="modal.editing?'Edit Combo':'Add Combo'"></h2></div>
                <div class="p-6 space-y-4">
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">Name *</label><input x-model="form.name" type="text" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="My Combo"></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">Strategy</label>
                        <select x-model="form.strategy" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"><option value="priority">Priority</option><option value="round-robin">Round Robin</option><option value="weighted">Weighted</option><option value="fallback">Fallback</option></select></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">Description</label><textarea x-model="form.description" rows="2" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></textarea></div>
                    <div class="grid grid-cols-3 gap-4">
                        <div><label class="block text-sm font-medium text-gray-700 mb-1">Max Retries</label><input x-model.number="form.maxRetries" type="number" min="0" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></div>
                        <div><label class="block text-sm font-medium text-gray-700 mb-1">Retry Delay (ms)</label><input x-model.number="form.retryDelayMs" type="number" min="0" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></div>
                        <div><label class="block text-sm font-medium text-gray-700 mb-1">Fallback Delay (ms)</label><input x-model.number="form.fallbackDelayMs" type="number" min="0" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></div>
                    </div>
                    <div x-show="modal.error" class="bg-red-50 text-red-700 px-4 py-2 rounded-lg text-sm" x-text="modal.error"></div>
                </div>
                <div class="p-6 border-t flex justify-end space-x-3">
                    <button @click="closeModal()" class="px-4 py-2 text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200">Cancel</button>
                    <button @click="save()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700" :disabled="modal.saving"><i x-show="modal.saving" class="fas fa-spinner fa-spin mr-1"></i><span x-text="modal.editing?'Update':'Create'"></span></button>
                </div>
            </div>
        </div>
        <div x-show="del.open" x-transition.opacity class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center" @click.self="del.open=false">
            <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm mx-4">
                <div class="p-6 text-center"><div class="w-14 h-14 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fas fa-exclamation-triangle text-red-600 text-2xl"></i></div><h3 class="text-lg font-bold">Delete Combo?</h3><p class="text-gray-500 mt-2">Delete <span class="font-medium" x-text="del.name"></span>?</p></div>
                <div class="p-6 border-t flex justify-end space-x-3"><button @click="del.open=false" class="px-4 py-2 bg-gray-100 rounded-lg">Cancel</button><button @click="deleteCombo()" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">Delete</button></div>
            </div>
        </div>
    </main>
</div>
<script>
function logout(){localStorage.removeItem('token');window.location.href='/login'}
function comboApp(){return{
    combos:[],loading:true,alert:{show:false,message:'',type:'success'},
    modal:{open:false,editing:false,error:'',saving:false,editId:null},
    del:{open:false,id:'',name:''},
    form:{name:'',strategy:'priority',description:'',maxRetries:3,retryDelayMs:1000,fallbackDelayMs:0},
    async init(){await this.fetch()},
    token(){return{'Authorization':'Bearer '+localStorage.getItem('token'),'Content-Type':'application/json'}},
    showAlert(m,t='success'){this.alert={show:true,message:m,type:t};setTimeout(()=>this.alert.show=false,3000)},
    async fetch(){this.loading=true;try{const r=await fetch('/api/combos',{headers:this.token()});const d=await r.json();this.combos=d.success?(d.data||[]):[]}catch(e){this.showAlert('Failed to load','error')}this.loading=false},
    openModal(c=null){if(c){this.modal.editing=true;this.modal.editId=c.id;this.form={name:c.name,strategy:c.strategy,description:c.description||'',maxRetries:c.maxRetries,retryDelayMs:c.retryDelayMs,fallbackDelayMs:c.fallbackDelayMs}}else{this.modal.editing=false;this.modal.editId=null;this.form={name:'',strategy:'priority',description:'',maxRetries:3,retryDelayMs:1000,fallbackDelayMs:0}}this.modal.error='';this.modal.open=true},
    closeModal(){this.modal.open=false},
    async save(){this.modal.saving=true;this.modal.error='';try{const url=this.modal.editing?'/api/combos/'+this.modal.editId:'/api/combos';const r=await fetch(url,{method:this.modal.editing?'PUT':'POST',headers:this.token(),body:JSON.stringify(this.form)});const d=await r.json();if(d.success){this.closeModal();this.showAlert(this.modal.editing?'Combo updated':'Combo created');await this.fetch()}else{this.modal.error=d.message||'Failed'}}catch(e){this.modal.error='Network error'}this.modal.saving=false},
    confirmDelete(c){this.del={open:true,id:c.id,name:c.name}},
    async deleteCombo(){try{const r=await fetch('/api/combos/'+this.del.id,{method:'DELETE',headers:this.token()});const d=await r.json();if(d.success){this.del.open=false;this.showAlert('Combo deleted');await this.fetch()}}catch(e){this.showAlert('Error','error')}}
}}
</script>
</body>
</html>
