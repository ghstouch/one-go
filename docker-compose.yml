version: '3.8'

services:
  one:
    build: .
    container_name: one
    ports:
      - "2500:2500"
    volumes:
      - one-data:/app/storage
    environment:
      - GIN_MODE=release
      - SERVER_PORT=2500
      - SERVER_HOST=0.0.0.0
      - DB_DRIVER=sqlite
      - DB_SQLITE_PATH=/app/storage/one.db
      - JWT_SECRET=change-me-in-production
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  one-data:
